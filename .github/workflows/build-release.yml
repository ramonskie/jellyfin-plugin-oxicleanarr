name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 3.2.4)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          # Strip 'v' prefix from tag
          VERSION="${GITHUB_REF_NAME#v}"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Resolved version: $VERSION"
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Setup Python for JPRM
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install JPRM
      run: pip install jprm
      
    - name: Build plugin with JPRM
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        mkdir -p ./artifacts
        PLUGIN_FILE=$(jprm plugin build Jellyfin.Plugin.OxiCleanarr --output ./artifacts --version "$VERSION")
        echo "Built plugin: $PLUGIN_FILE"
        mv "$PLUGIN_FILE" ./jellyfin-plugin-oxicleanarr.zip
        
    - name: Generate checksums
      run: |
        md5sum jellyfin-plugin-oxicleanarr.zip > jellyfin-plugin-oxicleanarr.zip.md5
        sha256sum jellyfin-plugin-oxicleanarr.zip > jellyfin-plugin-oxicleanarr.zip.sha256
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: plugin-artifacts
        path: |
          jellyfin-plugin-oxicleanarr.zip
          jellyfin-plugin-oxicleanarr.zip.md5
          jellyfin-plugin-oxicleanarr.zip.sha256
          
    - name: Create GitHub Release
      id: create_release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          jellyfin-plugin-oxicleanarr.zip
          jellyfin-plugin-oxicleanarr.zip.md5
          jellyfin-plugin-oxicleanarr.zip.sha256
        body: |
          ## Jellyfin Plugin: OxiCleanarr Bridge ${{ github.ref_name }}
          
          ### 🧹 BUT WAIT, THERE'S MORE! 🧹
          
          OxiClean for your media library! This plugin cleans up those tough symlink stains that other plugins leave behind!
          
          ### Installation
          
          1. In Jellyfin, go to **Dashboard** → **Plugins** → **Repositories**
          2. Add this repository URL: `https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json`
          3. Go to **Catalog** and install "OxiCleanarr Bridge"
          4. Restart Jellyfin
          5. Configure the plugin in **Dashboard** → **Plugins** → **OxiCleanarr Bridge**
          
          ### Manual Installation
          
          1. Download `jellyfin-plugin-oxicleanarr.zip`
          2. Extract the DLL to your Jellyfin plugins directory
          3. Restart Jellyfin
          
          ### Features
          
          - HTTP API for symlink management
          - API key authentication
          - List, add, and remove symlinks
          - The power of OxiClean in plugin form!
          
          ### API Endpoints
          
          - `POST /api/oxicleanarr/symlinks/add` - Create symlink
          - `POST /api/oxicleanarr/symlinks/remove` - Remove symlink
          - `GET /api/oxicleanarr/symlinks/list` - List all symlinks
          - `GET /api/oxicleanarr/status` - Get plugin status
          
          See the [API Documentation](https://github.com/${{ github.repository }}/blob/main/API.md) for detailed instructions.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Update manifest and push to main
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # Always work on the latest main, not the detached tag HEAD
        git fetch origin main
        git checkout main
        jprm repo add \
          --plugin-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/jellyfin-plugin-oxicleanarr.zip" \
          . jellyfin-plugin-oxicleanarr.zip
        git add manifest.json
        git diff --cached --quiet || git commit -m "Update manifest for release ${{ github.ref_name }}"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
